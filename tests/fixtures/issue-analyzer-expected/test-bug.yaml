# Expected debug report elements for test-bug fixture
# Used by tester to validate agent output - NOT passed to agent

fixture: test-bug
description: "Tests are flaky - pass locally, fail randomly in CI"

expected_analysis:
  symptom: "Flaky tests / tests pass locally but fail in CI"
  root_cause:
    correct_identification: "Race condition in test - loadBatch called without await, assertion runs before completion"
    location: "tests/parser.test.ts, 'should complete all requests before assertion' test"
    code_pattern: "loader.loadBatch(urls) called without await, expect runs immediately"
  complexity: "low or medium"  # low is acceptable for single-line fix
  fix_approach: "Add await before loadBatch call in the flaky test"

expected_impact:
  affected_files:
    - "tests/parser.test.ts"
  upstream_dependencies:
    - "N/A - test code only"
  downstream_effects:
    - "CI pipeline fails intermittently"
    - "Developer confidence in test suite reduced"
  risk_scope: "isolated"  # Test-only issue, no production impact

expected_validation_plan:
  p1_tests:
    - "Run the fixed test multiple times (10+) to verify no flakiness"
  p2_tests:
    - "Run full test suite to ensure no regressions"
  p3_tests:
    - "Run in CI environment to verify fix works there"

expected_confidence_criteria:
  high:
    - "Test passes consistently (10+ runs)"
    - "completedCount equals expected value after loadBatch completes"
    - "No timing-dependent behavior remains"

notes_for_tester:
  - "Agent should identify the bug is in TEST code, not production code"
  - "Production code (parser.ts) is correctly implemented with proper async/await"
  - "The flaky test at line ~82 calls loadBatch() without await"
  - "Race condition: assertion checks completedCount before async operations finish"
  - "Agent must NOT modify any files - only produce debug report"
  - "Root cause should point to test code issue, not production code"
