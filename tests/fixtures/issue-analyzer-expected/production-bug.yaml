# Expected debug report elements for production-bug fixture
# Used by tester to validate agent output - NOT passed to agent

fixture: production-bug
description: "Auth service fails for newly registered users without profile"

expected_analysis:
  symptom: "Login fails for new accounts / users report login failures"
  root_cause:
    correct_identification: "Null pointer in generateWelcome - accesses user.profile.displayName without null check"
    location: "src/auth.ts, generateWelcome method, line ~68"
    code_pattern: "user.profile.displayName accessed when profile is undefined"
  complexity: "low"  # or "medium" acceptable
  fix_approach: "Add null check before accessing profile properties"

expected_impact:
  affected_files:
    - "src/auth.ts"
  upstream_dependencies:
    - "login method calls generateWelcome"
  downstream_effects:
    - "All login attempts for users without profile will fail"
  risk_scope: "isolated"  # Single function, clear fix path

expected_validation_plan:
  p1_tests:
    - "Unit test for login with user that has no profile"
    - "Unit test for generateWelcome with undefined profile"
  p2_tests:
    - "Integration test for full registration -> login flow (no profile set)"
  p3_tests:
    - "E2E test for new user onboarding"

expected_confidence_criteria:
  high:
    - "New unit test for null profile case passes"
    - "Existing tests still pass"
    - "No other profile access points without null check"

notes_for_tester:
  - "Agent should identify the bug is in PRODUCTION code, not test code"
  - "Tests pass because they always set up profile before login (see beforeEach in login tests)"
  - "The bug only manifests when login is called before updateProfile"
  - "Agent must NOT modify any files - only produce debug report"
