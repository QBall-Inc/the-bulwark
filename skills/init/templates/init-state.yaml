## Init State Template
## Written to tmp/init/init-state.yaml during Stage 7.
## Read by --verify mode (Stage 8) to check component status.

init_state:
  timestamp: "{ISO-8601}"
  scope: "{project|user}"
  governance_installed: "{true|false}"
  selected_setup:
    statusline: "{true|false}"
    lsp: "{true|false}"
    scaffold: "{true|false}"
  languages: ["{selected languages}"]
  setup_completed:
    statusline: "{true|false}"
    lsp: "{true|false}"
    scaffold: "{true|false}"
