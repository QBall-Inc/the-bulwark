debug_report:
  metadata:
    issue_id: "null-handling-issues"
    timestamp: "2026-01-16T00:00:00Z"
    analyzer: "bulwark-issue-analyzer"
    complexity: medium
    issue_count: 2

  issues:
    - id: "issue-1-crash-on-fresh-app"
      symptom: "App crashes when getting double the last result on fresh open"
      root_cause: "getLastResultDoubled() uses non-null assertion on null lastResult"
      fix_location:
        file: "tests/fixtures/calculator-app/src/calculator.ts"
        lines: "349-352"
        function: "Calculator.getLastResultDoubled()"
      fix_approach: "Add null check before accessing lastResult, throw descriptive error"
      current_code: |
        getLastResultDoubled(): number {
          return this.lastResult! * 2;  // Will throw if lastResult is null
        }
      suggested_fix: |
        getLastResultDoubled(): number {
          if (this.lastResult === null) {
            throw new Error('No result available: perform a calculation first');
          }
          return this.lastResult * 2;
        }

    - id: "issue-2-percentage-nan"
      symptom: "Calculating percentages returns 'NaN' instead of numbers"
      root_cause: "percentage() has no input validation, null/undefined produces NaN"
      fix_location:
        file: "tests/fixtures/calculator-app/src/calculator.ts"
        lines: "328-332"
        function: "percentage()"
      fix_approach: "Add input validation matching other calculator functions"
      current_code: |
        export function percentage(value: number, total: number): number {
          return (value / total) * 100;
        }
      suggested_fix: |
        export function percentage(value: number, total: number): number {
          if (typeof value !== 'number' || typeof total !== 'number') {
            throw new Error('Invalid input: both arguments must be numbers');
          }
          if (Number.isNaN(value) || Number.isNaN(total)) {
            throw new Error('Invalid input: NaN values are not allowed');
          }
          if (total === 0) {
            throw new Error('Division by zero: total cannot be zero');
          }
          return (value / total) * 100;
        }

