debug_report:
  metadata:
    issue_id: "inverted-validation-logic"
    timestamp: "2026-01-16T00:00:00Z"
    analyzer: "bulwark-issue-analyzer"
    complexity: high
    bug_type: "Large - cross-cutting logic error"

  analysis:
    symptom: "safeDivide, safeMultiply, safeAdd throw 'Invalid number' for valid inputs like 10 and 2"
    root_cause: "validateNumber() helper has inverted logic - returns true for INVALID numbers instead of VALID"
    secondary_effect: "Invalid inputs (NaN, Infinity) are incorrectly ACCEPTED"
    fix_location:
      file: "tests/fixtures/calculator-app/src/calculator.ts"
      lines: "276-280"
      function: "validateNumber()"
    fix_approach: "Negate the return expression to return true for VALID numbers"

  affected_functions:
    root_cause:
      - name: "validateNumber"
        location: "calculator.ts:276-280"
        type: "helper (private)"
        issue: "Returns true for INVALID, should return true for VALID"

    downstream_breakage:
      - name: "safeDivide"
        location: "calculator.ts:282-289"
        type: "exported function"
        current_behavior: "Throws for valid numbers, accepts NaN/Infinity"
        expected_behavior: "Accepts valid numbers, throws for NaN/Infinity"

      - name: "safeMultiply"
        location: "calculator.ts:291-296"
        type: "exported function"
        current_behavior: "Throws for valid numbers, accepts NaN/Infinity"
        expected_behavior: "Accepts valid numbers, throws for NaN/Infinity"

      - name: "safeAdd"
        location: "calculator.ts:298-303"
        type: "exported function"
        current_behavior: "Throws for valid numbers, accepts NaN/Infinity"
        expected_behavior: "Accepts valid numbers, throws for NaN/Infinity"

  code_analysis:
    current_implementation: |
      function validateNumber(n: number): boolean {
        // Returns true when number IS invalid (NaN or not finite)
        return Number.isNaN(n) || !Number.isFinite(n);
      }

      // Usage in safe* functions:
      if (validateNumber(a) || validateNumber(b)) {
        throw new Error('Invalid number');
      }

    logic_trace_valid_input: |
      Input: safeDivide(10, 2)
      - validateNumber(10):
        - Number.isNaN(10) = false
        - Number.isFinite(10) = true
        - !Number.isFinite(10) = false
        - Result: false || false = false
      - validateNumber(2): same logic = false
      - Condition: if (false || false) = if (false)
      - Expected: Should NOT throw, should return 5
      - Actual per bug: Throws "Invalid number"

    logic_trace_invalid_input: |
      Input: safeDivide(NaN, 2)
      - validateNumber(NaN):
        - Number.isNaN(NaN) = true
        - Result: true (short-circuit)
      - Condition: if (true || ...) = if (true)
      - Expected: Should throw "Invalid number"
      - Actual per bug: Does NOT throw, returns NaN

    suggested_fix: |
      // Option 1: Negate the helper function return
      function validateNumber(n: number): boolean {
        // Returns true when number IS valid (not NaN and is finite)
        return !Number.isNaN(n) && Number.isFinite(n);
      }

      // Option 2: Keep helper, fix the condition usage
      if (!validateNumber(a) || !validateNumber(b)) {
        throw new Error('Invalid number');
      }

      // Recommended: Option 1 (clearer intent, fewer changes)

  impact_analysis:
    affected_files:
      - path: "tests/fixtures/calculator-app/src/calculator.ts"
        reason: "Contains validateNumber and all three safe* functions"

    upstream_dependencies:
      - path: "tests/fixtures/calculator-app/src/calculator.test.ts"
        tests:
          - "line 547: safeDivide(10, 2) - FAILS"
          - "line 551: safeMultiply(3, 4) - FAILS"
          - "line 555: safeAdd(1, 2) - FAILS"
          - "line 560-563: chained operations - FAILS"
          - "line 568: safeDivide(NaN, 2) - FAILS (should throw, doesn't)"
          - "line 572: safeMultiply(Infinity, 2) - FAILS (should throw, doesn't)"

    downstream_effects:
      - description: "ALL safe math operations broken for valid inputs"
      - description: "Security: NaN/Infinity bypass validation, could corrupt calculations"
      - description: "Any code depending on safe* functions is affected"

    risk_scope: broad
    security_implication: true

  validation_plan:
    tests_to_execute:
      - path: "tests/fixtures/calculator-app/src/calculator.test.ts"
        test_name: "should safely divide valid numbers"
        reason: "Direct verification of safeDivide fix"
        priority: 1

      - path: "tests/fixtures/calculator-app/src/calculator.test.ts"
        test_name: "should safely multiply valid numbers"
        reason: "Direct verification of safeMultiply fix"
        priority: 1

      - path: "tests/fixtures/calculator-app/src/calculator.test.ts"
        test_name: "should safely add valid numbers"
        reason: "Direct verification of safeAdd fix"
        priority: 1

      - path: "tests/fixtures/calculator-app/src/calculator.test.ts"
        test_name: "should reject NaN in safeDivide"
        reason: "Verify invalid inputs now correctly rejected"
        priority: 1

      - path: "tests/fixtures/calculator-app/src/calculator.test.ts"
        test_name: "should reject Infinity in safeMultiply"
        reason: "Verify invalid inputs now correctly rejected"
        priority: 1

      - path: "tests/fixtures/calculator-app/src/calculator.test.ts"
        test_name: "should chain safe operations"
        reason: "Integration test across all functions"
        priority: 2

    functionalities_to_validate:
      must_work:
        - "safeDivide(10, 2) returns 5"
        - "safeMultiply(3, 4) returns 12"
        - "safeAdd(1, 2) returns 3"
        - "safeDivide(100, 25) returns 4"
        - "safeAdd(safeMultiply(2, 3), 4) returns 10"

      must_throw:
        - "safeDivide(NaN, 2) throws 'Invalid number'"
        - "safeMultiply(Infinity, 2) throws 'Invalid number'"
        - "safeAdd(NaN, NaN) throws 'Invalid number'"
        - "safeDivide(10, 0) throws 'Division by zero'"

  confidence_criteria:
    high:
      - "All 5 P1 tests pass"
      - "P2 integration test passes"
      - "No regressions in other calculator functions"
      - "Both valid-input and invalid-input paths verified"

    medium:
      - "P1 tests pass but some edge cases untested"

    low:
      - "Partial fix only addresses some functions"
      - "Invalid input rejection not fully verified"

  escalation:
    required: true
    reason: "Broad scope bug with security implications - manual verification recommended"
    manual_tests:
      - "Verify NaN cannot propagate through safe* function chains"
      - "Verify Infinity is properly rejected at all entry points"
      - "Spot-check edge cases: -0, Number.MAX_VALUE, Number.MIN_VALUE"

  debug_journey:
    started_at: "2026-01-16T00:00:00Z"
    complexity_justification: "High - affects 4 functions, inverted logic, security implications"

    hypotheses_tested:
      - hypothesis: "Individual safe* functions have bugs"
        tested_at: "2026-01-16T00:00:00Z"
        method: "Traced code in safeDivide, safeMultiply, safeAdd"
        result: rejected
        evidence: "All three use identical pattern, bug must be in shared code"

      - hypothesis: "Shared validateNumber helper has inverted logic"
        tested_at: "2026-01-16T00:00:00Z"
        method: "Traced validateNumber return values for valid/invalid inputs"
        result: confirmed
        evidence: "validateNumber(10) returns false, validateNumber(NaN) returns true - inverted from expected"

    investigation_path:
      - "User reported all safe math functions reject valid numbers"
      - "Observed all three functions use same if-condition pattern"
      - "Identified shared validateNumber helper called by all three"
      - "Traced validateNumber logic - found inverted return semantics"
      - "Confirmed this explains both symptoms: valid rejected AND invalid accepted"
      - "Classified as high complexity due to broad impact and security implications"

  five_whys:
    - question: "Why do safeDivide, safeMultiply, safeAdd throw for valid numbers?"
      answer: "The if condition triggers when it shouldn't"
    - question: "Why does the if condition trigger incorrectly?"
      answer: "validateNumber() returns unexpected value for valid numbers"
    - question: "Why does validateNumber return wrong value?"
      answer: "Logic is inverted - returns true for INVALID instead of VALID"
    - question: "Why is the logic inverted?"
      answer: "Missing negation in return expression"
    - question: "Why was this not caught earlier?"
      answer: "Intentional bug for P0.4 verification testing"
