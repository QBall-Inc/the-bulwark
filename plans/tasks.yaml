# The Bulwark - Task Breakdown
#
# Each task has an implementation plan in plans/task-briefs/P{phase}.{task}-{name}.md
# Tasks are designed to be self-contained or explicitly dependent
#
# SCHEDULE RATIONALE:
# - P0: Foundation skills + Test Audit skills (T1-T4 rules encoded here)
# - P1: Early Agents (as skills with context: fork - available for rest of development)
# - P2: Verification Scripts
# - P3: Enforcement Infrastructure (hooks with once: true, just)
# - P4: Review Skills + Code Auditor + Implementer (as skills with context: fork)
# - P5: Commands, Evolution (Ralph loops), Testing, and Polish
#
# CLAUDE CODE 2.1.1 UPDATES:
# - Agents implemented as skills with context: fork
# - Skills use flat directory structure (no atomic/composite nesting)
# - User-invocable: false for internal skills
# - agent: haiku/sonnet for model selection
# - once: true for SessionStart hooks
# - Diagnostic output REQUIRED for ALL skills (validated 2026-01-10)
# - Ralph Wiggum loops for iterative creation
#
# DIAGNOSTIC OUTPUT REQUIREMENT (Added 2026-01-10):
# All skills MUST include a Diagnostic Output section that writes to:
#   logs/diagnostics/{skill-name}-{timestamp}.yaml
# Format: See plans/task-briefs/P0.1-subagent-prompting.md Section 3.2

