# The Bulwark - Task Breakdown
#
# Each task has an implementation plan in plans/task-briefs/P{phase}.{task}-{name}.md
# Tasks are designed to be self-contained or explicitly dependent
#
# NOTE: Completed phases (P0-P3) archived to tasks_completed.yaml (Session 29)
#
# SCHEDULE RATIONALE:
# - P0: Foundation skills + Test Audit skills (T1-T4 rules encoded here) - COMPLETED
# - P1: Early Agents (custom sub-agents for pipeline stages) - COMPLETED
# - P2: Verification Scripts - COMPLETED
# - P3: Enforcement Infrastructure (hooks with once: true, just) - COMPLETED
# - P4: Review Skills + Standalone Auditor/Implementer agents
# - P5: Commands, Evolution (Ralph loops), Testing, and Polish
# - P6: Optional Enhancements
#
# CLAUDE CODE 2.1.1 UPDATES:
# - Custom sub-agents defined as markdown files in tests/agents/ or skills/
# - Pipeline stages use general-purpose agents with role-based prompts + skill references
# - Skills use flat directory structure (no atomic/composite nesting)
# - User-invocable: false for internal skills
# - agent: haiku/sonnet for model selection
# - once: true for SessionStart hooks
# - Diagnostic output REQUIRED for ALL skills (validated 2026-01-10)
# - Ralph Wiggum loops for iterative creation
#
# ARCHITECTURE CLARIFICATION (Updated 2026-01-16):
# - Pipelines orchestrate general-purpose sub-agents with specific roles
# - Each pipeline stage loads relevant skill via frontmatter (skills: skill-name)
# - Custom sub-agents (e.g., bulwark-issue-analyzer) encapsulate stage behavior
# - Standalone agents (e.g., bulwark-code-auditor) for ad-hoc use outside pipelines
#
# DIAGNOSTIC OUTPUT REQUIREMENT (Added 2026-01-10):
# All skills MUST include a Diagnostic Output section that writes to:
#   logs/diagnostics/{skill-name}-{timestamp}.yaml
# Format: See plans/task-briefs/P0.1-subagent-prompting.md Section 3.2

